<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #1a1a2e; }
      .subtitle { font-size: 13px; fill: #6b7280; }
      .node-label { font-size: 15px; font-weight: 700; }
      .small { font-size: 12px; fill: #374151; }
      .tiny { font-size: 11px; fill: #4b5563; }
      .pod-label { font-size: 11px; font-weight: 600; fill: #1e3a5f; }
    </style>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="900" height="560" fill="#ffffff"/>

  <!-- Header -->
  <text x="40" y="46" class="title">Kubernetes Cluster</text>
  <text x="40" y="68" class="subtitle">One control plane orchestrating a set of worker nodes</text>

  <!-- Cluster boundary -->
  <rect x="30" y="88" width="840" height="440" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="52" y="112" class="tiny" fill="#94a3b8" font-weight="600">CLUSTER</text>

  <!-- Control Plane / Master node -->
  <g filter="url(#soft)">
    <rect x="60" y="130" width="200" height="370" rx="12" fill="#eaf1fd" stroke="#326CE5" stroke-width="2"/>
  </g>
  <rect x="60" y="130" width="200" height="40" rx="12" fill="#326CE5"/>
  <rect x="60" y="150" width="200" height="20" fill="#326CE5"/>
  <text x="160" y="156" class="node-label" fill="#ffffff" text-anchor="middle">Master Node</text>
  <text x="160" y="188" class="tiny" fill="#326CE5" text-anchor="middle" font-weight="600">Control Plane</text>

  <!-- control plane component chips -->
  <g>
    <rect x="80" y="210" width="160" height="52" rx="8" fill="#ffffff" stroke="#c7d7f5"/>
    <text x="160" y="232" class="small" text-anchor="middle" font-weight="700" fill="#1e3a5f">API Server</text>
    <text x="160" y="250" class="tiny" text-anchor="middle">front door to the cluster</text>

    <rect x="80" y="272" width="160" height="52" rx="8" fill="#ffffff" stroke="#c7d7f5"/>
    <text x="160" y="294" class="small" text-anchor="middle" font-weight="700" fill="#1e3a5f">Scheduler</text>
    <text x="160" y="312" class="tiny" text-anchor="middle">places pods on nodes</text>

    <rect x="80" y="334" width="160" height="52" rx="8" fill="#ffffff" stroke="#c7d7f5"/>
    <text x="160" y="356" class="small" text-anchor="middle" font-weight="700" fill="#1e3a5f">Controllers</text>
    <text x="160" y="374" class="tiny" text-anchor="middle">keep state correct</text>

    <rect x="80" y="396" width="160" height="52" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="160" y="418" class="small" text-anchor="middle" font-weight="700" fill="#9a3412">etcd</text>
    <text x="160" y="436" class="tiny" text-anchor="middle">cluster state store</text>
  </g>

  <!-- Worker nodes -->
  <!-- Worker 1 -->
  <g filter="url(#soft)">
    <rect x="330" y="130" width="250" height="180" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="330" y="130" width="250" height="34" rx="12" fill="#10b981"/>
  <rect x="330" y="146" width="250" height="18" fill="#10b981"/>
  <text x="455" y="152" class="node-label" fill="#ffffff" text-anchor="middle">Worker Node 1</text>

  <g>
    <rect x="350" y="180" width="100" height="110" rx="10" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="400" y="198" class="pod-label" text-anchor="middle">Pod</text>
    <rect x="362" y="208" width="76" height="30" rx="5" fill="#d1fae5"/>
    <text x="400" y="228" class="tiny" text-anchor="middle" fill="#065f46">container</text>
    <rect x="362" y="246" width="76" height="30" rx="5" fill="#d1fae5"/>
    <text x="400" y="266" class="tiny" text-anchor="middle" fill="#065f46">container</text>

    <rect x="462" y="180" width="100" height="110" rx="10" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="512" y="198" class="pod-label" text-anchor="middle">Pod</text>
    <rect x="474" y="208" width="76" height="30" rx="5" fill="#d1fae5"/>
    <text x="512" y="228" class="tiny" text-anchor="middle" fill="#065f46">container</text>
  </g>

  <!-- Worker 2 -->
  <g filter="url(#soft)">
    <rect x="330" y="330" width="250" height="170" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="330" y="330" width="250" height="34" rx="12" fill="#10b981"/>
  <rect x="330" y="346" width="250" height="18" fill="#10b981"/>
  <text x="455" y="352" class="node-label" fill="#ffffff" text-anchor="middle">Worker Node 2</text>

  <g>
    <rect x="350" y="380" width="100" height="100" rx="10" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="400" y="398" class="pod-label" text-anchor="middle">Pod</text>
    <rect x="362" y="408" width="76" height="30" rx="5" fill="#d1fae5"/>
    <text x="400" y="428" class="tiny" text-anchor="middle" fill="#065f46">container</text>
    <rect x="362" y="442" width="76" height="26" rx="5" fill="#d1fae5"/>
    <text x="400" y="460" class="tiny" text-anchor="middle" fill="#065f46">container</text>

    <rect x="462" y="380" width="100" height="100" rx="10" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="512" y="398" class="pod-label" text-anchor="middle">Pod</text>
    <rect x="474" y="408" width="76" height="30" rx="5" fill="#d1fae5"/>
    <text x="512" y="428" class="tiny" text-anchor="middle" fill="#065f46">container</text>
  </g>

  <!-- Worker 3 -->
  <g filter="url(#soft)">
    <rect x="620" y="130" width="220" height="370" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="620" y="130" width="220" height="34" rx="12" fill="#10b981"/>
  <rect x="620" y="146" width="220" height="18" fill="#10b981"/>
  <text x="730" y="152" class="node-label" fill="#ffffff" text-anchor="middle">Worker Node 3</text>

  <g>
    <rect x="640" y="182" width="180" height="140" rx="10" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="730" y="202" class="pod-label" text-anchor="middle">Pod</text>
    <rect x="654" y="214" width="152" height="34" rx="5" fill="#d1fae5"/>
    <text x="730" y="236" class="tiny" text-anchor="middle" fill="#065f46">container</text>
    <rect x="654" y="256" width="152" height="34" rx="5" fill="#d1fae5"/>
    <text x="730" y="278" class="tiny" text-anchor="middle" fill="#065f46">container</text>
    <rect x="654" y="298" width="152" height="18" rx="5" fill="#a7f3d0"/>
    <text x="730" y="311" class="tiny" text-anchor="middle" fill="#065f46">shared network + storage</text>

    <rect x="640" y="336" width="180" height="150" rx="10" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="730" y="356" class="pod-label" text-anchor="middle">Pod</text>
    <rect x="654" y="368" width="152" height="42" rx="5" fill="#d1fae5"/>
    <text x="730" y="394" class="tiny" text-anchor="middle" fill="#065f46">container</text>
    <rect x="654" y="418" width="152" height="42" rx="5" fill="#d1fae5"/>
    <text x="730" y="444" class="tiny" text-anchor="middle" fill="#065f46">container</text>
  </g>

  <!-- Arrows from control plane to workers -->
  <g stroke="#326CE5" stroke-width="2" fill="none" opacity="0.55">
    <path d="M262 240 C 300 240, 300 210, 328 210" marker-end="url(#arrow)"/>
    <path d="M262 300 C 300 300, 300 400, 328 400" marker-end="url(#arrow)"/>
    <path d="M262 350 C 560 350, 560 250, 618 250" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#326CE5"/>
    </marker>
  </defs>

  <text x="285" y="512" class="tiny" fill="#94a3b8">Control plane schedules &amp; manages workloads across all worker nodes →</text>
</svg>
