<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #1a1a2e; }
      .subtitle { font-size: 13px; fill: #6b7280; }
      .small { font-size: 12px; fill: #374151; }
      .tiny { font-size: 11px; fill: #4b5563; }
      .mono { font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; }
    </style>
    <filter id="dsoft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="darr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0ea5e9"/>
    </marker>
    <marker id="darrp" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#ffffff"/>

  <text x="40" y="46" class="title">Deployment: ReplicaSets with superpowers</text>
  <text x="40" y="68" class="subtitle">Same YAML as a ReplicaSet (just kind: Deployment) — but now you get rolling updates &amp; rollbacks</text>

  <!-- Deployment box (top) -->
  <g filter="url(#dsoft)">
    <rect x="230" y="95" width="440" height="100" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2.5"/>
  </g>
  <rect x="230" y="95" width="440" height="36" rx="12" fill="#0ea5e9"/>
  <rect x="230" y="113" width="440" height="18" fill="#0ea5e9"/>
  <text x="450" y="119" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Deployment: nginx-deployment</text>
  <text x="450" y="154" class="small" text-anchor="middle" font-weight="600" fill="#075985">replicas: 3  ·  image: nginx:latest</text>
  <rect x="280" y="164" width="340" height="22" rx="11" fill="#e0f2fe"/>
  <text x="450" y="179" class="tiny" text-anchor="middle" fill="#0369a1" font-weight="600">manages ReplicaSets · one per app version</text>

  <!-- Old ReplicaSet (v1, scaling down) -->
  <g filter="url(#dsoft)">
    <rect x="60" y="260" width="360" height="150" rx="12" fill="#faf5ff" stroke="#a78bfa" stroke-width="2" opacity="0.85"/>
  </g>
  <rect x="60" y="260" width="360" height="32" rx="12" fill="#a78bfa"/>
  <rect x="60" y="276" width="360" height="16" fill="#a78bfa"/>
  <text x="240" y="281" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">ReplicaSet (v1 — nginx:1.24)</text>
  <text x="240" y="314" class="tiny" text-anchor="middle" fill="#6d28d9" font-weight="700">scaling DOWN: 3 → 2 → 1 → 0</text>

  <g>
    <rect x="86" y="330" width="90" height="60" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="131" y="356" class="tiny" text-anchor="middle" font-weight="700" fill="#5b21b6">pod v1</text>
    <text x="131" y="374" class="tiny" text-anchor="middle" fill="#7c3aed">draining…</text>
    <rect x="196" y="330" width="90" height="60" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-dasharray="5 4"/>
    <text x="241" y="364" class="tiny" text-anchor="middle" fill="#a78bfa">terminated</text>
    <rect x="306" y="330" width="90" height="60" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-dasharray="5 4"/>
    <text x="351" y="364" class="tiny" text-anchor="middle" fill="#a78bfa">terminated</text>
  </g>

  <!-- New ReplicaSet (v2, scaling up) -->
  <g filter="url(#dsoft)">
    <rect x="480" y="260" width="360" height="150" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="2.5"/>
  </g>
  <rect x="480" y="260" width="360" height="32" rx="12" fill="#10b981"/>
  <rect x="480" y="276" width="360" height="16" fill="#10b981"/>
  <text x="660" y="281" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">ReplicaSet (v2 — nginx:1.25)</text>
  <text x="660" y="314" class="tiny" text-anchor="middle" fill="#047857" font-weight="700">scaling UP: 0 → 1 → 2 → 3</text>

  <g>
    <rect x="506" y="330" width="90" height="60" rx="8" fill="#ffffff" stroke="#6ee7b7"/>
    <text x="551" y="356" class="tiny" text-anchor="middle" font-weight="700" fill="#065f46">pod v2</text>
    <text x="551" y="374" class="tiny" text-anchor="middle" fill="#059669">running ✓</text>
    <rect x="616" y="330" width="90" height="60" rx="8" fill="#ffffff" stroke="#6ee7b7"/>
    <text x="661" y="356" class="tiny" text-anchor="middle" font-weight="700" fill="#065f46">pod v2</text>
    <text x="661" y="374" class="tiny" text-anchor="middle" fill="#059669">running ✓</text>
    <rect x="726" y="330" width="90" height="60" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-dasharray="5 4"/>
    <text x="771" y="356" class="tiny" text-anchor="middle" font-weight="700" fill="#059669">pod v2</text>
    <text x="771" y="374" class="tiny" text-anchor="middle" fill="#34d399">starting…</text>
  </g>

  <!-- arrows deployment -> replicasets -->
  <g stroke="#0ea5e9" stroke-width="2" fill="none">
    <path d="M330 197 C 290 220, 260 235, 245 256" marker-end="url(#darr)"/>
    <path d="M570 197 C 610 220, 640 235, 655 256" marker-end="url(#darr)"/>
  </g>
  <text x="255" y="228" class="tiny" fill="#0ea5e9" font-weight="700">old</text>
  <text x="630" y="228" class="tiny" fill="#0ea5e9" font-weight="700">new</text>

  <!-- rolling update band -->
  <g stroke="#f59e0b" stroke-width="2.5" fill="none">
    <path d="M424 340 L 472 340" marker-end="url(#darr)"/>
  </g>
  <text x="448" y="328" class="tiny" text-anchor="middle" fill="#b45309" font-weight="700">rolling</text>
  <text x="448" y="356" class="tiny" text-anchor="middle" fill="#b45309" font-weight="700">update</text>

  <!-- Why Deployment strip -->
  <rect x="60" y="440" width="780" height="130" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="82" y="468" class="small" font-weight="700" fill="#1e293b">Why not just use a ReplicaSet directly?</text>

  <g>
    <rect x="82" y="484" width="236" height="66" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="200" y="508" class="tiny" text-anchor="middle" font-weight="700" fill="#0369a1">🚀 Rolling updates</text>
    <text x="200" y="526" class="tiny" text-anchor="middle">change the image → pods are</text>
    <text x="200" y="540" class="tiny" text-anchor="middle">replaced gradually, zero downtime</text>

    <rect x="332" y="484" width="236" height="66" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="450" y="508" class="tiny" text-anchor="middle" font-weight="700" fill="#0369a1">⏪ Rollbacks</text>
    <text x="450" y="526" class="tiny" text-anchor="middle">old ReplicaSet is kept at 0 —</text>
    <text x="450" y="540" class="tiny" text-anchor="middle">one command to go back</text>

    <rect x="582" y="484" width="236" height="66" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="700" y="508" class="tiny" text-anchor="middle" font-weight="700" fill="#0369a1">📜 Revision history</text>
    <text x="700" y="526" class="tiny" text-anchor="middle">every change is versioned,</text>
    <text x="700" y="540" class="tiny" text-anchor="middle">you deploy declaratively</text>
  </g>

  <text x="60" y="598" class="tiny" fill="#6b7280">Hierarchy: Deployment → creates &amp; manages ReplicaSets → which create &amp; manage Pods. You almost always write Deployments.</text>
</svg>
