<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #1a1a2e; }
      .subtitle { font-size: 13px; fill: #6b7280; }
      .comp-title { font-size: 16px; font-weight: 700; }
      .comp-desc { font-size: 12px; fill: #374151; }
      .tiny { font-size: 11px; fill: #6b7280; }
      .badge { font-size: 11px; font-weight: 600; }
      .pod-label { font-size: 12px; font-weight: 700; fill: #065f46; }
    </style>
    <filter id="soft3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#ffffff"/>

  <text x="40" y="46" class="title">Inside a Worker Node</text>
  <text x="40" y="68" class="subtitle">Where your pods actually run — and the agents that keep them running</text>

  <!-- Worker boundary -->
  <rect x="40" y="90" width="820" height="440" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <rect x="40" y="90" width="820" height="6" rx="3" fill="#10b981"/>
  <text x="62" y="120" class="badge" fill="#059669">WORKER NODE</text>

  <!-- Control plane reference (top) -->
  <rect x="330" y="98" width="240" height="34" rx="8" fill="#326CE5"/>
  <text x="450" y="120" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">API Server (control plane)</text>

  <!-- kubelet -->
  <g filter="url(#soft3)">
    <rect x="70" y="170" width="230" height="120" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="70" y="170" width="230" height="32" rx="12" fill="#10b981"/>
  <rect x="70" y="188" width="230" height="14" fill="#10b981"/>
  <text x="185" y="192" class="comp-title" fill="#ffffff" text-anchor="middle">kubelet</text>
  <text x="185" y="228" class="comp-desc" text-anchor="middle" font-weight="600">The node's agent</text>
  <text x="185" y="248" class="tiny" text-anchor="middle">Takes pod specs from the API server</text>
  <text x="185" y="264" class="tiny" text-anchor="middle">and makes sure containers are</text>
  <text x="185" y="280" class="tiny" text-anchor="middle">running &amp; healthy</text>

  <!-- container runtime -->
  <g filter="url(#soft3)">
    <rect x="70" y="320" width="230" height="120" rx="12" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  </g>
  <rect x="70" y="320" width="230" height="32" rx="12" fill="#0d9488"/>
  <rect x="70" y="338" width="230" height="14" fill="#0d9488"/>
  <text x="185" y="342" class="comp-title" fill="#ffffff" text-anchor="middle">Container Runtime</text>
  <text x="185" y="378" class="comp-desc" text-anchor="middle" font-weight="600">e.g. containerd, CRI-O</text>
  <text x="185" y="398" class="tiny" text-anchor="middle">Actually pulls images and</text>
  <text x="185" y="414" class="tiny" text-anchor="middle">starts / stops containers via</text>
  <text x="185" y="430" class="tiny" text-anchor="middle">the CRI interface</text>

  <!-- kube-proxy -->
  <g filter="url(#soft3)">
    <rect x="70" y="460" width="230" height="52" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="185" y="484" class="comp-title" fill="#9a3412" text-anchor="middle" font-size="14">kube-proxy</text>
  <text x="185" y="502" class="tiny" text-anchor="middle">Handles pod networking &amp; routing rules</text>

  <!-- Pods area -->
  <text x="360" y="162" class="tiny" fill="#059669" font-weight="600">PODS RUNNING ON THIS NODE</text>

  <g filter="url(#soft3)">
    <rect x="360" y="172" width="220" height="150" rx="12" fill="#ffffff" stroke="#6ee7b7" stroke-width="2"/>
  </g>
  <text x="470" y="194" class="pod-label" text-anchor="middle">Pod A</text>
  <rect x="378" y="206" width="184" height="46" rx="6" fill="#d1fae5"/>
  <text x="470" y="234" class="comp-desc" text-anchor="middle" fill="#065f46" font-weight="600">container (app)</text>
  <rect x="378" y="260" width="184" height="46" rx="6" fill="#d1fae5"/>
  <text x="470" y="288" class="comp-desc" text-anchor="middle" fill="#065f46" font-weight="600">container (sidecar)</text>

  <g filter="url(#soft3)">
    <rect x="620" y="172" width="220" height="150" rx="12" fill="#ffffff" stroke="#6ee7b7" stroke-width="2"/>
  </g>
  <text x="730" y="194" class="pod-label" text-anchor="middle">Pod B</text>
  <rect x="638" y="206" width="184" height="100" rx="6" fill="#d1fae5"/>
  <text x="730" y="262" class="comp-desc" text-anchor="middle" fill="#065f46" font-weight="600">container (app)</text>

  <g filter="url(#soft3)">
    <rect x="360" y="342" width="480" height="150" rx="12" fill="#ffffff" stroke="#6ee7b7" stroke-width="2"/>
  </g>
  <text x="600" y="364" class="pod-label" text-anchor="middle">Pod C</text>
  <rect x="378" y="376" width="220" height="100" rx="6" fill="#d1fae5"/>
  <text x="488" y="432" class="comp-desc" text-anchor="middle" fill="#065f46" font-weight="600">container</text>
  <rect x="606" y="376" width="216" height="100" rx="6" fill="#d1fae5"/>
  <text x="714" y="432" class="comp-desc" text-anchor="middle" fill="#065f46" font-weight="600">container</text>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="2" fill="none">
    <!-- apiserver -> kubelet -->
    <path d="M330 118 C 200 130, 185 145, 185 168" marker-end="url(#a3)"/>
    <!-- kubelet -> runtime -->
    <path d="M185 292 L 185 318" marker-end="url(#a3)"/>
    <!-- runtime -> pods -->
    <path d="M302 360 C 330 300, 340 250, 358 240" marker-end="url(#a3)"/>
    <path d="M302 380 C 340 400, 350 410, 358 415" marker-end="url(#a3)"/>
  </g>
  <text x="222" y="145" class="tiny" fill="#326CE5" font-weight="600">pod specs</text>
  <text x="150" y="308" class="tiny" fill="#0d9488" font-weight="600">start containers</text>

  <text x="360" y="512" class="tiny">kubelet watches the API server, tells the runtime what to run, and reports status back.</text>
</svg>
